- name: Install Node.js 24 from NodeSource
  hosts: all
  become: true
  roles:
    - ansible-suite.apt_thirdparty
  vars:
    nodejs_version: 24.x
    apt_thirdparty_repo_name: nodesource
    apt_thirdparty_repo_key_url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    apt_thirdparty_repo_url: https://deb.nodesource.com/node_{{ nodejs_version }}
    apt_thirdparty_repo_suite: nodistro
    apt_thirdparty_pkg: nodejs
    apt_thirdparty_unattended_upgrades: true
